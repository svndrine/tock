<nb-card
  [ngClass]="{ selected: sentence._showDialog }"
  class="my-2"
  [id]="getSentenceId(sentence)"
>
  <nb-card-body
    class="grid-columns flex-wrap p-3"
    [ngClass]="{ 'grid-columns-without-selection': !selection }"
  >
    <nb-checkbox
      *ngIf="selection"
      [checked]="isSentenceSelected()"
      (checkedChange)="toggle()"
      class="mt-1"
    ></nb-checkbox>

    <div class="flex-grow-1 d-flex flex-column">
      <div class="sentence-header-zone">
        <tock-sentence-training-sentence [sentence]="sentence"></tock-sentence-training-sentence>

        <div class="quick-actions-right">
          <button
            nbButton
            ghost
            shape="round"
            nbTooltip="Copy sentence"
            (click)="copySentence()"
          >
            <nb-icon icon="copy"></nb-icon>
            <span class="btn-text">Copy</span>
          </button>

          <button
            nbButton
            ghost
            shape="round"
            nbTooltip="Test this sentence in a dialog"
            (click)="testDialogSentence()"
          >
            <nb-icon icon="terminal-plus"></nb-icon>
            <span class="btn-text">Test</span>
          </button>
        </div>
      </div>

      <nb-card
        class="mx-3 mt-2 mb-0"
        accent="info"
        *ngIf="sentence.forReview && sentence.reviewComment"
      >
        <nb-card-body class="text-muted review">
          <strong class="d-block">Review comment :</strong>
          {{ sentence.reviewComment }}
        </nb-card-body>
      </nb-card>

      <div class="font-size-small text-muted unselectable d-flex justify-content-end align-items-center mt-auto pr-3">
        <div>
          <time>{{ sentence.creationDate | date: 'd MMMM yyyy' }}</time>
          <span class="text-uppercase mx-1" nbTooltip="Sentence status">
            {{ sentence.statusDisplayed() }}
          </span>
          <span nbTooltip="Sentence configuration">{{ sentence.configuration }}</span>
          <span *ngIf="sentence.qualifier" nbTooltip="Qualifier">{{ sentence.qualifier }}</span>
        </div>
      </div>
    </div>


    <div class="tools-panel">

      <div class="config-section d-flex flex-column gap-1">
        <div class="d-flex">
          <nb-form-field class="mb-0 flex-grow-1" nbTooltip="Intent association">
            <nb-icon nbPrefix icon="compass"></nb-icon>
            <input
              #sentenceIntentInput
              nbInput
              fullWidth
              type="text"
              placeholder="{{ getSentenceAttribut('intentLabel') }}"
              (focus)="onFocus()"
              (blur)="onBlur($event)"
              (keyup.escape)="onBlur($event)"
              (keyup)="filterIntentsList($event)"
              autocomplete="off"
              [nbAutocomplete]="intentsAutocomplete"
              class="intent-input"
            />
            <nb-icon
              nbSuffix
              icon="book"
              *ngIf="isIntentStorySearchable()"
              (click)="displayIntentStoryDetails()"
              nbTooltip="Show intent story details"
              class="pointer mr-3"
            ></nb-icon>
          </nb-form-field>

          <nb-autocomplete size="tiny" #intentsAutocomplete (selectedChange)="addIntentToSentence($event)">
            <nb-option-group *ngFor="let group of filteredIntentGroups | async" [title]="group.category">
              <nb-option *ngFor="let intent of group.intents" [value]="intent._id">
                {{ intent.label || intent.name }}
              </nb-option>
            </nb-option-group>
          </nb-autocomplete>
        </div>

        <nb-form-field nbTooltip="Set sentence language" class="w-100">
          <nb-icon nbPrefix icon="globe2"></nb-icon>
          <nb-select [(ngModel)]="sentence.language" placeholder="Sentence language" fullWidth>
            <nb-option *ngFor="let l of state.currentApplication.supportedLocales" [value]="l">
              {{ state.localeName(l) }}
            </nb-option>
          </nb-select>
        </nb-form-field>
      </div>

      <div class="actions-grid">
        <button
          nbButton
          nbTooltip="Validate"
          status="success"
          [ngClass]="{ 'action-button-active': isActionButtonSuggested(Action.VALIDATE) || isActionButtonHighlighted(Action.VALIDATE) }"
          [ghost]="!isActionButtonHighlighted(Action.VALIDATE)"
          [outline]="isActionButtonSuggested(Action.VALIDATE)"
          shape="round"
          size="large"
          (click)="handleAction(Action.VALIDATE)"
        >
          <nb-icon icon="check-circle-fill"></nb-icon>
        </button>

        <button
          nbButton
          nbTooltip="Ask for review"
          status="info"
          [ghost]="!isActionButtonHighlighted('review')"
          shape="round"
          size="large"
          (click)="askForReview()"
        >
          <nb-icon icon="search"></nb-icon>
        </button>

        <button
          *ngIf="sentenceTrainingMode !== SentenceTrainingMode.UNKNOWN"
          nbButton
          nbTooltip="Set as unknown"
          status="warning"
          [ngClass]="{ 'action-button-active': isActionButtonSuggested(Action.UNKNOWN) || isActionButtonHighlighted(Action.UNKNOWN) }"
          [ghost]="!isActionButtonHighlighted(Action.UNKNOWN)"
          [outline]="isActionButtonSuggested(Action.UNKNOWN)"
          shape="round"
          size="large"
          (click)="handleAction(Action.UNKNOWN)"
        >
          <nb-icon icon="question-circle"></nb-icon>
        </button>

        <button
          *ngIf="sentenceTrainingMode !== SentenceTrainingMode.RAGEXCLUDED"
          nbButton
          nbTooltip="Exclude from Rag handling"
          status="warning"
          [ngClass]="{ 'action-button-active': isActionButtonSuggested(Action.RAGEXCLUDED) || isActionButtonHighlighted(Action.RAGEXCLUDED) }"
          [ghost]="!isActionButtonHighlighted(Action.RAGEXCLUDED)"
          [outline]="isActionButtonSuggested(Action.RAGEXCLUDED)"
          shape="round"
          size="large"
          (click)="handleAction(Action.RAGEXCLUDED)"
        >
          <nb-icon icon="lightbulb-off"></nb-icon>
        </button>

        <button
          nbButton
          nbTooltip="Delete"
          status="danger"
          ghost
          shape="round"
          size="large"
          (click)="handleAction(Action.DELETE)"
        >
          <nb-icon icon="trash"></nb-icon>
        </button>

        <button
          nbButton
          nbTooltip="Create new Intent"
          ghost
          shape="round"
          size="large"
          (click)="createNewIntent()"
        >
          <nb-icon icon="compass"></nb-icon>
        </button>

        <button
          *ngIf="state.hasRole(UserRole.botUser)"
          nbButton
          nbTooltip="Create new FAQ based on this sentence"
          ghost
          shape="round"
          size="large"
          (click)="redirectToFaqManagement()"
        >
          <nb-icon icon="chat-left-text"></nb-icon>
        </button>

        <button
          *ngIf="!standAlone"
          nbButton
          nbTooltip="Show dialog"
          ghost
          shape="round"
          size="large"
          status="info"
          (click)="showDetails()"
        >
          <nb-icon icon="wechat"></nb-icon>
        </button>
      </div>

    </div>
  </nb-card-body>
</nb-card>
